async function createAnnotation(color, noteContent, markStyle) {
  if (!pendingAnnotationAnchor || !currentBookId) return;
  if (!hasAuthUser()) {
    hideAnnotationToolbar();
    openLogin();
    return;
  }
  const payload = {
    ...pendingAnnotationAnchor,
    color: color || 'yellow',
    markStyle: markStyle || 'highlight',
    noteContent: noteContent || null
  };
  try {
    const created = await api('POST',
      '/api/user/books/' + currentBookId + '/chapters/' + currentChapterIndex + '/annotations',
      payload);
    currentAnnotations.push(created);
    clearSelectedReadingContext();
    await loadChapterAnnotations();
    renderAnnotationList();
  } catch (e) {
    alert('保存划线失败：' + e.message);
  }
}

async function loadChapterAnnotations() {
  orphanedAnnotationIds = new Set();
  if (!hasAuthUser() || !currentBookId) {
    currentAnnotations = [];
    renderAnnotationList();
    return;
  }
  try {
    currentAnnotations = await api('GET',
      '/api/user/books/' + currentBookId + '/chapters/' + currentChapterIndex + '/annotations') || [];
    renderChapterAnnotations();
    if (annotationFilter === 'chapter') renderAnnotationList();
  } catch (e) {
    console.warn('加载划线失败', e);
    currentAnnotations = [];
  }
}

function renderChapterAnnotations() {
  const root = annotationTextRoot();
  if (!root) return;
  root.querySelectorAll('.reading-highlight').forEach(mark => {
    mark.replaceWith(...mark.childNodes);
  });
  root.normalize();
  const text = root.textContent || '';
  currentAnnotations
    .slice()
    .sort((a, b) => (b.startOffset || 0) - (a.startOffset || 0))
    .forEach(annotation => {
      const resolved = resolveAnnotationAnchor(annotation, text);
      if (!resolved) {
        orphanedAnnotationIds.add(annotation.id);
        return;
      }
      applyAnnotationMarks(root, resolved.start, resolved.end, annotation);
    });
}

function resolveAnnotationAnchor(annotation, text) {
  const start = Number(annotation.startOffset);
  const selected = annotation.selectedText || '';
  if (start >= 0 && text.slice(start, start + selected.length) === selected) {
    return { start, end: start + selected.length };
  }
  let best = null;
  let from = 0;
  while (selected && from <= text.length) {
    const index = text.indexOf(selected, from);
    if (index < 0) break;
    let score = 0;
    const prefix = annotation.prefixText || '';
    const suffix = annotation.suffixText || '';
    if (prefix) {
      const comparable = prefix.slice(-Math.min(prefix.length, index, 120));
      if (text.slice(index - comparable.length, index) === comparable) score += comparable.length;
    }
    if (suffix) {
      const comparable = suffix.slice(0, 120);
      if (text.slice(index + selected.length, index + selected.length + comparable.length) === comparable) {
        score += comparable.length;
      }
    }
    score -= Math.abs(index - (Number.isFinite(start) ? start : index)) / 1000;
    if (!best || score > best.score) best = { start: index, end: index + selected.length, score };
    from = index + Math.max(1, selected.length);
  }
  return best ? { start: best.start, end: best.end } : null;
}

function applyAnnotationMarks(root, start, end, annotation) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const segments = [];
  let node;
  let offset = 0;
  while ((node = walker.nextNode())) {
    const nodeStart = offset;
    const nodeEnd = offset + node.data.length;
    if (nodeEnd > start && nodeStart < end) {
      segments.push({
        node,
        start: Math.max(0, start - nodeStart),
        end: Math.min(node.data.length, end - nodeStart)
      });
    }
    offset = nodeEnd;
  }
  segments.reverse().forEach(segment => {
    if (segment.end <= segment.start) return;
    const range = document.createRange();
    range.setStart(segment.node, segment.start);
    range.setEnd(segment.node, segment.end);
    const mark = document.createElement('mark');
    const markStyle = ['highlight', 'underline', 'wavy'].includes(annotation.markStyle)
      ? annotation.markStyle : 'highlight';
    mark.className = 'reading-highlight mark-' + markStyle
      + (annotation.noteContent ? ' has-note' : '');
    mark.dataset.annotationId = annotation.id;
    mark.dataset.color = annotation.color || 'yellow';
    range.surroundContents(mark);
  });
}

function switchReaderSideTab(tab) {
  const notes = tab === 'notes';
  document.getElementById('aiAgentPane').hidden = notes;
  document.getElementById('annotationPane').hidden = !notes;
  document.getElementById('agentTabBtn').classList.toggle('active', !notes);
  document.getElementById('notesTabBtn').classList.toggle('active', notes);
  if (notes) renderAnnotationList();
}

async function setAnnotationFilter(filter) {
  annotationFilter = filter === 'book' ? 'book' : 'chapter';
  document.getElementById('chapterNotesFilter').classList.toggle('active', annotationFilter === 'chapter');
  document.getElementById('bookNotesFilter').classList.toggle('active', annotationFilter === 'book');
  if (annotationFilter === 'book' && hasAuthUser() && currentBookId) {
    try {
      const items = await api('GET', '/api/user/books/' + currentBookId + '/annotations') || [];
      renderAnnotationList(items);
      return;
    } catch (e) {
      console.warn('加载全书划词与想法失败', e);
    }
  }
  renderAnnotationList();
}

function renderAnnotationList(items) {
  const list = document.getElementById('annotationList');
  if (!list) return;
  const annotations = (items || currentAnnotations).slice().sort((a, b) => {
    const noteOrder = Number(!!b.noteContent) - Number(!!a.noteContent);
    return noteOrder || String(b.updatedAt || '').localeCompare(String(a.updatedAt || ''));
  });
  list.replaceChildren();
  if (!hasAuthUser()) {
    list.innerHTML = '<div class="annotation-empty">登录后可保存并跨设备同步划词和想法。</div>';
    return;
  }
  if (!annotations.length) {
    list.innerHTML = '<div class="annotation-empty">选择正文后即可划词或写想法。</div>';
    return;
  }
  annotations.forEach(annotation => {
    const item = document.createElement('div');
    item.className = 'annotation-item'
      + (annotation.noteContent ? ' has-note' : '')
      + (orphanedAnnotationIds.has(annotation.id) ? ' orphaned' : '');
    item.dataset.color = annotation.color || 'yellow';
    const quote = document.createElement('div');
    quote.className = 'annotation-item-quote';
    quote.textContent = '“' + trimText(annotation.selectedText, 150) + '”';
    item.appendChild(quote);
    if (annotation.noteContent) {
      const note = document.createElement('div');
      note.className = 'annotation-item-note';
      note.textContent = annotation.noteContent;
      item.appendChild(note);
    }
    const meta = document.createElement('div');
    meta.className = 'annotation-item-meta';
    const chapter = annotation.chapterTitle || ('第 ' + annotation.chapterIndex + ' 章');
    meta.textContent = chapter + (orphanedAnnotationIds.has(annotation.id) ? ' · 原文位置已变化' : '');
    item.appendChild(meta);
    item.addEventListener('click', () => locateAnnotation(annotation));
    list.appendChild(item);
  });
}

async function locateAnnotation(annotation) {
  if (annotation.chapterIndex !== currentChapterIndex) {
    currentChapterIndex = annotation.chapterIndex;
    await loadCurrentChapter();
  }
  const mark = document.querySelector('.reading-highlight[data-annotation-id="' + annotation.id + '"]');
  if (mark) {
    mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
    document.querySelectorAll('.annotation-focus').forEach(el => el.classList.remove('annotation-focus'));
    document.querySelectorAll('.reading-highlight[data-annotation-id="' + annotation.id + '"]')
      .forEach(el => el.classList.add('annotation-focus'));
    window.setTimeout(() => document.querySelectorAll('.annotation-focus')
      .forEach(el => el.classList.remove('annotation-focus')), 1800);
  }
}

function openAnnotationEditor(annotation) {
  editingAnnotation = annotation || null;
  annotationEditorStyle = annotation && annotation.markStyle ? annotation.markStyle : 'highlight';
  annotationEditorColor = annotation && annotation.color ? annotation.color : 'yellow';
  document.getElementById('annotationEditorTitle').textContent =
    annotation && !annotation.noteContent ? '编辑划词' : '写想法';
  document.getElementById('annotationEditorQuote').textContent =
    annotation ? annotation.selectedText : (pendingAnnotationAnchor ? pendingAnnotationAnchor.selectedText : '');
  document.getElementById('annotationEditorText').value = annotation && annotation.noteContent
    ? annotation.noteContent : '';
  document.getElementById('annotationDeleteBtn').style.visibility = annotation ? 'visible' : 'hidden';
  document.getElementById('annotationEditorMarkOptions').style.display =
    annotation && !annotation.noteContent ? 'flex' : 'none';
  updateAnnotationEditorMarkOptions();
  hideAnnotationToolbar();
  document.getElementById('annotationOverlay').classList.add('active');
  document.getElementById('annotationEditorText').focus();
}

function closeAnnotationEditor() {
  editingAnnotation = null;
  document.getElementById('annotationOverlay').classList.remove('active');
}

async function saveAnnotationEditor() {
  const noteContent = document.getElementById('annotationEditorText').value.trim();
  try {
    if (editingAnnotation) {
      await api('PUT', '/api/user/annotations/' + editingAnnotation.id, {
        color: annotationEditorColor,
        markStyle: annotationEditorStyle,
        noteContent
      });
    } else {
      await createAnnotation(annotationEditorColor, noteContent, annotationEditorStyle);
    }
    closeAnnotationEditor();
    await loadChapterAnnotations();
    if (annotationFilter === 'book') await setAnnotationFilter('book');
  } catch (e) {
    alert('保存想法失败：' + e.message);
  }
}

function openAnnotationMarkPicker() {
  if (!hasAuthUser()) {
    hideAnnotationToolbar();
    openLogin();
    return;
  }
  document.getElementById('annotationToolbar').classList.add('picking');
  updateMarkPickerState();
  window.requestAnimationFrame(() => {
    const toolbar = document.getElementById('annotationToolbar');
    const left = Math.max(8, Math.min(
      window.innerWidth - toolbar.offsetWidth - 8,
      parseFloat(toolbar.style.left) || 8
    ));
    toolbar.style.left = left + 'px';
  });
}

function updateMarkPickerState() {
  const picker = document.querySelector('#annotationToolbar .annotation-mark-picker');
  if (!picker) return;
  picker.querySelectorAll('[data-style]').forEach(button => {
    button.classList.toggle('active', button.dataset.style === markPickerStyle);
  });
  picker.querySelectorAll('[data-color]').forEach(button => {
    button.classList.toggle('active', button.dataset.color === markPickerColor);
  });
}

function updateAnnotationEditorMarkOptions() {
  const options = document.getElementById('annotationEditorMarkOptions');
  if (!options) return;
  options.querySelectorAll('[data-style]').forEach(button => {
    button.classList.toggle('active', button.dataset.style === annotationEditorStyle);
  });
  options.querySelectorAll('[data-color]').forEach(button => {
    button.classList.toggle('active', button.dataset.color === annotationEditorColor);
  });
}

function openReadingDialog(title, message, options) {
  const config = options || {};
  readingDialogAction = typeof config.onConfirm === 'function' ? config.onConfirm : null;
  document.getElementById('readingDialogTitle').textContent = title || '确认操作';
  document.getElementById('readingDialogMessage').textContent = message || '';
  const cancel = document.getElementById('readingDialogCancelBtn');
  const confirmButton = document.getElementById('readingDialogConfirmBtn');
  cancel.style.display = config.showCancel === false ? 'none' : '';
  confirmButton.textContent = config.confirmText || '确定';
  confirmButton.classList.toggle('danger', !!config.danger);
  document.getElementById('readingDialogOverlay').classList.add('active');
  confirmButton.focus();
}

function closeReadingDialog() {
  readingDialogAction = null;
  document.getElementById('readingDialogOverlay').classList.remove('active');
}

async function acceptReadingDialog() {
  const action = readingDialogAction;
  closeReadingDialog();
  if (action) await action();
}

function deleteEditingAnnotation() {
  if (!editingAnnotation) return;
  const annotationId = editingAnnotation.id;
  const hasThought = !!editingAnnotation.noteContent;
  openReadingDialog(
    hasThought ? '删除划词和想法？' : '删除这条划词？',
    hasThought
      ? '删除后，划词、想法以及对应的画像证据都会被移除，此操作无法撤销。'
      : '删除后将无法恢复这条划词。',
    {
      confirmText: '删除',
      danger: true,
      onConfirm: async () => {
        try {
          await api('DELETE', '/api/user/annotations/' + annotationId);
          closeAnnotationEditor();
          await loadChapterAnnotations();
          if (annotationFilter === 'book') await setAnnotationFilter('book');
        } catch (e) {
          openReadingDialog('删除失败', e.message || '暂时无法删除，请稍后重试。', {
            confirmText: '知道了',
            showCancel: false
          });
        }
      }
    }
  );
}

async function searchBooks() {
  const keyword = document.getElementById('searchInput').value.trim();
  if (!keyword) return;
  try {
    // 使用 ES 搜索接口，支持高亮
    const results = await api('GET', '/api/search?keyword=' + encodeURIComponent(keyword));
    const listEl = document.getElementById('shelfList');
    document.getElementById('shelfStatus').textContent = '搜索结果';
    listEl.innerHTML = '';
    // results 直接是数组（List）
    (results || []).forEach(result => {
      const div = document.createElement('div');
      div.className = 'books-item';
      div.onclick = () => openBook(result.id);
      // 标题和作者支持 ES 高亮标签
      const titleHtml = result.titleHighlight || esc(result.title);
      const authorHtml = result.authorHighlight || esc(result.author || '未知');
      div.innerHTML = '<div class="books-item-title">' + titleHtml + '</div>' +
        '<div class="books-item-author">' + authorHtml + '</div>';
      listEl.appendChild(div);
    });
  } catch (e) { console.error(e); }
}

async function loadBookshelf() {
  const listEl = document.getElementById('shelfList');
  if (!hasAuthUser()) {
    shelfItems = [];
    listEl.innerHTML = '';
    document.getElementById('shelfStatus').textContent = '登录后查看书架';
    return;
  }
  try {
    shelfItems = await api('GET', '/api/user/bookshelf') || [];
    renderBookshelf();
  } catch (e) {
    console.error(e);
    document.getElementById('shelfStatus').textContent = '书架加载失败';
  }
}

function renderBookshelf() {
  const listEl = document.getElementById('shelfList');
  listEl.innerHTML = '';
  document.getElementById('shelfStatus').textContent = shelfItems.length ? '已加入 ' + shelfItems.length + ' 本' : '书架为空';
  shelfItems.forEach(item => {
    const book = item.book || item;
    const div = document.createElement('div');
    div.className = 'books-item';
    div.onclick = () => openBook(book.id);

    const row = document.createElement('div');
    row.className = 'books-item-row';
    const main = document.createElement('div');
    main.className = 'books-item-main';
    main.innerHTML = '<div class="books-item-title">' + esc(book.title || '') + '</div>' +
      '<div class="books-item-author">' + esc(book.author || '未知') + '</div>';
    row.appendChild(main);

    const ragButton = document.createElement('button');
    const status = item.ragStatus || 'NONE';
    ragButton.className = 'rag-toggle ' + status.toLowerCase();
    ragButton.textContent = ragStatusText(status);
    ragButton.title = ragStatusTitle(status, item.ragError);
    ragButton.disabled = status === 'INDEXING' || status === 'READY';
    ragButton.onclick = (event) => {
      event.stopPropagation();
      startShelfRag(book.id);
    };
    row.appendChild(ragButton);
    div.appendChild(row);
    listEl.appendChild(div);
  });
}

function ragStatusText(status) {
  if (status === 'READY') return '✓';
  if (status === 'INDEXING') return '…';
  if (status === 'FAILED') return '!';
  return 'R';
}

function ragStatusTitle(status, error) {
  if (status === 'READY') return 'RAG 已完成';
  if (status === 'INDEXING') return 'RAG 构建中';
  if (status === 'FAILED') return 'RAG 构建失败：' + (error || '可重试');
  return '构建 RAG';
}

async function startShelfRag(bookId) {
  if (!hasAuthUser()) { openLogin(); return; }
  try {
    await api('POST', '/api/user/bookshelf/' + bookId + '/rag');
    await loadBookshelf();
  } catch (e) {
    alert(e.message || 'RAG 构建启动失败');
  }
}

async function openBook(bookId) {
  if (currentBookId) {
    await saveReadingProgress();
  }
  currentBookId = bookId;
  suppressReadingProgressTracking = true;
  try {
    const book = await api('GET', '/api/books/' + bookId);
    document.getElementById('readerBookTitle').textContent = book.title;
    document.getElementById('readerBookSub').textContent = (book.author || '') + ' · ' + (book.status || '');
    chaptersCache = await api('GET', '/api/books/' + bookId + '/chapters');
    const select = document.getElementById('chapterSelect');
    renderChapterOptions(select, chaptersCache);
    updateMobileTocButton();
    const progress = hasAuthUser()
      ? await api('GET', '/api/user/books/' + bookId + '/progress').catch(() => null)
      : null;
    const availableIndexes = chaptersCache.map(chapter => chapter.chapterIndex);
    currentChapterIndex = progress && availableIndexes.includes(progress.chapterIndex)
      ? progress.chapterIndex
      : (availableIndexes[0] || 1);
    await loadCurrentChapter();
    await restoreReadingOffset(progress || { offset: 0 });
  } catch (e) {
    console.error(e);
  } finally {
    window.setTimeout(() => {
      suppressReadingProgressTracking = false;
    }, 300);
  }
}

function renderChapterOptions(select, chapters) {
  select.innerHTML = '';
  const hasVolume = (chapters || []).some(ch => ch.volumeTitle);
  if (!hasVolume) {
    (chapters || []).forEach(ch => select.appendChild(chapterOption(ch)));
    return;
  }

  let currentGroup = null;
  let currentVolumeKey = null;
  (chapters || []).forEach(ch => {
    const volumeKey = ch.volumeTitle || '';
    if (volumeKey !== currentVolumeKey) {
      currentVolumeKey = volumeKey;
      currentGroup = document.createElement('optgroup');
      currentGroup.label = volumeKey || '未分卷';
      select.appendChild(currentGroup);
    }
    currentGroup.appendChild(chapterOption(ch));
  });
}

function chapterOption(ch) {
  const opt = document.createElement('option');
  opt.value = ch.chapterIndex;
  const level = Math.max(1, Math.min(3, Number(ch.hierarchyLevel) || 1));
  const indent = '\u00A0\u00A0\u00A0'.repeat(level - 1);
  opt.textContent = indent + (ch.title || '未命名章节');
  opt.dataset.level = String(level);
  if (level === 1) {
    opt.style.fontWeight = '600';
  }
  return opt;
}

async function loadCurrentChapter() {

    currentChapterContent = chapter.content || '';
    renderChapterContent(chapter);
    await loadChapterAnnotations();

    renderSelectedReadingContext();
    document.getElementById('chapterSelect').value = currentChapterIndex;
    updateMobileTocButton();
    updateChapterNavigationState();

  } catch (e) { console.error(e); }

function renderChapterContent(chapter) {
  const container = document.getElementById('chapterContent');
  container.replaceChildren();

  const title = document.createElement('h1');
  title.className = 'reader-chapter-title';
  title.textContent = chapter.title || '';
  container.appendChild(title);

  if (chapter.contentHtml) {
    const body = document.createElement('div');
    body.className = 'reader-rich-body';
    body.innerHTML = chapter.contentHtml;
    if (hasLeadingMatchingHeading(body, chapter.title || '')) {
      title.remove();
    }
    container.appendChild(body);
    return;
  }

  container.appendChild(document.createTextNode(chapter.content || ''));
}

function hasLeadingMatchingHeading(body, chapterTitle) {
  const titleKey = normalizeHeadingText(chapterTitle);
  if (!titleKey) return false;

  const leadingHeadings = [];
  let element = findLeadingHeading(body);
  while (element && leadingHeadings.length < 2) {
    leadingHeadings.push(element);
    const combinedKey = normalizeHeadingText(
      leadingHeadings.map(heading => heading.textContent || '').join(' ')
    );
    if (combinedKey === titleKey) {
      return true;
    }
    element = findNextLeadingHeading(element, body);
  }
  return false;
}

function findLeadingHeading(container) {
  let element = container.firstElementChild;
  let depth = 0;
  while (element && depth < 4) {
    if (/^H[1-3]$/.test(element.tagName)) return element;
    if (!/^(DIV|SECTION|HEADER)$/.test(element.tagName)) return null;
    element = element.firstElementChild;
    depth++;
  }
  return null;
}

function findNextLeadingHeading(heading, body) {
  if (heading.nextElementSibling && /^H[1-3]$/.test(heading.nextElementSibling.tagName)) {
    return heading.nextElementSibling;
  }

  let wrapper = heading.parentElement;
  while (wrapper && wrapper !== body) {
    const sibling = wrapper.nextElementSibling;
    if (sibling) {
      return /^H[1-3]$/.test(sibling.tagName) ? sibling : findLeadingHeading(sibling);
    }
    wrapper = wrapper.parentElement;
  }
  return null;
}

function normalizeHeadingText(value) {
  return String(value || '')
    .replace(/\s+/g, '')
    .replace(/[—–－]/g, '-')
    .replace(/[：:]/g, ':')
    .trim();
}

async function nextChapter() {

    suppressReadingProgressTracking = true;

    await saveReadingProgress(0);
    releaseReadingProgressTracking();
  }
}

function updateChapterNavigationState() {
  const indexes = chaptersCache.map(chapter => chapter.chapterIndex);
  const min = indexes.length ? Math.min(...indexes) : currentChapterIndex;
  const max = indexes.length ? Math.max(...indexes) : currentChapterIndex;
  const atFirst = !currentBookId || currentChapterIndex <= min;
  const atLast = !currentBookId || currentChapterIndex >= max;
  ['topPrevChapterBtn', 'bottomPrevChapterBtn'].forEach(id => {
    document.getElementById(id).disabled = atFirst;
  });
  ['topNextChapterBtn', 'bottomNextChapterBtn'].forEach(id => {
    document.getElementById(id).disabled = atLast;
  });

function scrollReaderToTop() {

    block: 'start'
  });

function releaseReadingProgressTracking() {
  window.setTimeout(() => {
    suppressReadingProgressTracking = false;
  }, 500);
}

function currentReadingOffset() {
  const content = document.getElementById('chapterContent');
  if (!content || !currentBookId) return 0;
  const contentTop = content.getBoundingClientRect().top + window.scrollY;
  const offset = Math.max(0, window.scrollY - contentTop);
  return Math.min(Math.round(offset), Math.max(0, content.scrollHeight));
}

async function saveReadingProgress(forcedOffset) {
  if (suppressReadingProgressTracking && forcedOffset == null) return;
  if (!hasAuthUser() || !currentBookId || !currentChapterIndex) return;
  const offset = forcedOffset == null ? currentReadingOffset() : forcedOffset;
  const anchor = forcedOffset == null ? currentReadingAnchor() : null;
  try {
    await api('POST', '/api/user/books/' + currentBookId + '/progress', {
      chapterIndex: currentChapterIndex,
      offset,
      anchorText: anchor ? anchor.anchorText : null,
      prefixText: anchor ? anchor.prefixText : null,
      suffixText: anchor ? anchor.suffixText : null,
      anchorOffset: anchor ? anchor.anchorOffset : null
    });
  } catch (e) {
    console.warn('阅读进度保存失败', e);
  }
}

function scheduleReadingProgressSave() {
  if (suppressReadingProgressTracking || !hasAuthUser() || !currentBookId) return;
  window.clearTimeout(readingProgressSaveTimer);
  readingProgressSaveTimer = window.setTimeout(() => saveReadingProgress(), 800);
}

async function restoreReadingOffset(progressOrOffset) {
  const content = document.getElementById('chapterContent');
  if (!content) return;
  const images = Array.from(content.querySelectorAll('img'));
  await Promise.race([
    Promise.all(images.map(image => image.complete
      ? Promise.resolve()
      : new Promise(resolve => {
          image.addEventListener('load', resolve, { once: true });
          image.addEventListener('error', resolve, { once: true });
        }))),
    new Promise(resolve => window.setTimeout(resolve, 1000))
  ]);
  const contentTop = content.getBoundingClientRect().top + window.scrollY;
  const progress = typeof progressOrOffset === 'object' && progressOrOffset
    ? progressOrOffset
    : { offset: progressOrOffset };
  const anchorOffset = resolveProgressAnchorInElement(content, progress);
  if (anchorOffset != null) {
    const rect = rectForTextOffset(content, anchorOffset);
    if (rect) {
      window.scrollTo({ top: window.scrollY + rect.top - 18, behavior: 'auto' });
      return;
    }
  }
  window.scrollTo({
    top: contentTop + Math.max(0, Number(progress.offset) || 0),
    behavior: 'auto'
  });
}

function currentReadingAnchor() {
  const root = annotationTextRoot();
  if (!root) return null;
  const offset = textOffsetNearViewportTop(root);
  const text = root.textContent || '';
  const normalizedOffset = Math.max(0, Math.min(offset, text.length));
  const anchorText = text.slice(normalizedOffset, normalizedOffset + 120).trim();
  return {
    anchorText,
    anchorOffset: normalizedOffset,
    prefixText: text.slice(Math.max(0, normalizedOffset - 120), normalizedOffset),
    suffixText: text.slice(normalizedOffset + anchorText.length, normalizedOffset + anchorText.length + 120)
  };
}

function textOffsetNearViewportTop(root) {
  const rect = root.getBoundingClientRect();
  const x = Math.max(8, Math.min(window.innerWidth - 8, rect.left + 24));
  const y = Math.max(8, Math.min(window.innerHeight - 8, Math.max(rect.top, 0) + 18));
  let range = null;
  if (document.caretPositionFromPoint) {
    const pos = document.caretPositionFromPoint(x, y);
    if (pos) {
      range = document.createRange();
      range.setStart(pos.offsetNode, pos.offset);
    }
  } else if (document.caretRangeFromPoint) {
    range = document.caretRangeFromPoint(x, y);
  }
  if (!range || !root.contains(range.startContainer)) {
    return Math.max(0, currentReadingOffset());
  }
  const offsetRange = document.createRange();
  offsetRange.selectNodeContents(root);
  offsetRange.setEnd(range.startContainer, range.startOffset);
  return offsetRange.toString().length;
}

function resolveProgressAnchorInElement(root, progress) {
  const text = root.textContent || '';
  const anchor = (progress.anchorText || '').trim();
  if (!anchor) return null;
  return resolveTextAnchor(text, anchor, progress.prefixText || '', progress.suffixText || '', Number(progress.anchorOffset || progress.offset || 0));
}

function resolveTextAnchor(text, anchor, prefix, suffix, preferredOffset) {
  if (!anchor) return null;
  const start = Number(preferredOffset);
  if (Number.isFinite(start) && start >= 0 && text.slice(start, start + anchor.length) === anchor) {
    return start;
  }
  let best = null;
  let from = 0;
  while (from <= text.length) {
    const index = text.indexOf(anchor, from);
    if (index < 0) break;
    let score = -Math.abs(index - (Number.isFinite(start) ? start : index)) / 1000;
    if (prefix) {
      const comparable = prefix.slice(-Math.min(prefix.length, index, 120));
      if (text.slice(index - comparable.length, index) === comparable) score += comparable.length;
    }
    if (suffix) {
      const comparable = suffix.slice(0, 120);
      if (text.slice(index + anchor.length, index + anchor.length + comparable.length) === comparable) score += comparable.length;
    }
    if (!best || score > best.score) best = { index, score };
    from = index + Math.max(1, anchor.length);
  }
  return best ? best.index : null;
}

function rectForTextOffset(root, offset) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  let node;
  let cursor = 0;
  while ((node = walker.nextNode())) {
    const next = cursor + node.data.length;
    if (next >= offset) {
      const range = document.createRange();
      const local = Math.max(0, Math.min(node.data.length, offset - cursor));
      range.setStart(node, local);
      range.setEnd(node, Math.min(node.data.length, local + 1));
      return range.getBoundingClientRect();
    }
    cursor = next;
  }
  return null;
}

// ========== AI阅读Agent ==========
function prepareAiForCurrentChapter(chapter) {
  const nextSessionId = currentBookId ? 'book_' + currentBookId + '_chapter_' + currentChapterIndex : null;
  if (nextSessionId !== aiSessionId) {
    aiSessionId = nextSessionId;
    aiContextId = null;
    aiMessages = [];
    if (currentBookId) {
      aiMessages.push({
        role: 'assistant',
        content: '可以向我提问当前章节内容。我会优先结合本章片段、阅读上下文和你的个人记忆来回答。'
      });
    }
  }
  updateAiPanelState(chapter && chapter.title ? chapter.title : '');
  renderAiMessages();
}

function updateAiPanelState(chapterTitle) {
  const visibleChapterTitle = chapterTitle || currentChapterTitle;
  const input = document.getElementById('aiQuestionInput');
  const sendBtn = document.getElementById('aiSendBtn');
  const label = document.getElementById('aiSessionLabel');
  const hint = document.getElementById('aiInputHint');
  const profileBtn = document.getElementById('aiProfileUpdateBtn');
  const styleBtn = document.getElementById('aiProfileStyleBtn');
  if (!input || !sendBtn || !label || !hint) return;

  const hasBook = !!currentBookId;
  input.disabled = !hasBook || aiLoading;
  sendBtn.disabled = !hasBook || aiLoading;
  if (profileBtn) {
    profileBtn.disabled = profileUpdating;
    profileBtn.textContent = profileUpdating ? '更新中...' : '更新画像';
  }
  if (styleBtn) {
    styleBtn.disabled = profileStyleLoading || profileStyleSaving;
    styleBtn.textContent = profileStyleLoading ? '加载中...' : '编辑风格';
  }
  input.placeholder = hasBook ? '围绕当前章节提问...' : '先选择一本书，然后向我提问...';
  label.textContent = hasBook
    ? '当前：书籍 ' + currentBookId + ' · 第 ' + currentChapterIndex + ' 章' + (visibleChapterTitle ? ' · ' + visibleChapterTitle : '')
    : '未选择书籍';
  hint.textContent = hasAuthUser()
    ? '已登录，将使用个人记忆增强回答。'
    : '未登录也可以试用；登录后会启用个人记忆。';
}

function renderAiMessages() {
  const box = document.getElementById('aiMessages');
  if (!box) return;

  if (!currentBookId && aiMessages.length === 0) {
    box.innerHTML = '<div class="ai-empty"><div class="ai-empty-title">选择一本书开始</div><div>打开章节后，可以在这里向阅读 Agent 提问。</div></div>';
    updateAiPanelState();
    return;
  }

  let html = '';
  aiMessages.forEach((msg, msgIndex) => {
    const role = msg.role || 'assistant';
    html += '<div class="ai-message ' + esc(role) + '">';
    html += '<div class="ai-bubble">' + renderAiContent(msg.content || '', role) + '</div>';
    if (msg.sources && msg.sources.length) {
      html += renderAiMetaBlock('参考来源', msg.sources);
    }
    if (msg.memoryRefs && msg.memoryRefs.length) {
      html += renderAiMetaBlock('相关记忆', msg.memoryRefs);
    }
    if (msg.externalMcpPlanRefs && msg.externalMcpPlanRefs.length) {
      html += renderAiMetaBlock('工具规划', msg.externalMcpPlanRefs);
    }
    if (msg.externalMcpRefs && msg.externalMcpRefs.length) {
      html += renderAiMetaBlock('MCP 工具', msg.externalMcpRefs);
    }
    if (msg.interaction) {
      html += renderAiInteraction(msg.interaction, msgIndex);
    }
    html += '</div>';
  });

  if (aiLoading) {
    html += '<div class="ai-message assistant"><div class="ai-bubble"><span class="ai-loading">正在结合上下文思考</span></div></div>';
  }

  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
  updateAiPanelState();
}

async function sendAiQuestion() {
  if (!currentBookId || aiLoading) return;
  const input = document.getElementById('aiQuestionInput');
  const question = input.value.trim();
  if (!question) return;

  aiMessages.push({ role: 'user', content: question });
  input.value = '';
  aiLoading = true;
  renderAiMessages();

  try {
    const userId = hasAuthUser() && currentUser.id != null ? String(currentUser.id) : guestUserId;
    const resp = await api('POST', '/api/ai/chat', {
      bookId: currentBookId,
      chapterIndex: currentChapterIndex,
      question,
      userId,
      sessionId: aiSessionId || ('book_' + currentBookId + '_chapter_' + currentChapterIndex),
      contextId: aiContextId,
      topK: 5,
      enableMemory: true,
      enableRag: true,
      enableExternalMcp: true,
      chapterTitle: currentChapterTitle,
      chapterContent: currentChapterContent,
      selectedText: selectedReadingPayload().selectedText || null,
      selectedContext: selectedReadingPayload().selectedContext || null
    });

    if (resp && resp.contextId != null) aiContextId = resp.contextId;
    if (resp && resp.sessionId) aiSessionId = resp.sessionId;
    aiMessages.push({
      role: 'assistant',
      content: (resp && resp.answer) ? resp.answer : '模型没有返回有效回答。',
      status: (resp && resp.status) || 'completed',
      interaction: (resp && resp.interaction) || null,
      sources: (resp && resp.sources) || [],
      memoryRefs: (resp && resp.memoryRefs) || [],
      externalMcpPlanRefs: (resp && resp.externalMcpPlanRefs) || [],
      externalMcpRefs: (resp && resp.externalMcpRefs) || []
    });
  } catch (e) {
    aiMessages.push({
      role: 'error',
      content: 'AI请求失败：' + (e && e.message ? e.message : '请稍后重试')
    });
  } finally {
    aiLoading = false;
    renderAiMessages();
  }
}

async function updateUserProfile() {
  if (profileUpdating) return;
  profileUpdating = true;
  renderAiMessages();
  try {
    const { userId, sessionId } = profileIdentity();
    const resp = await api('POST', '/api/profile/update', {
      userId,
      sessionId,
      bookId: currentBookId,
      chapterIndex: currentChapterIndex,
      question: ''
    });
    let content = '画像更新完成';
    if (resp && resp.status === 'not_enough_memory') {
      content = '最近重要记忆不足，继续阅读问答后再更新画像。';
    } else {
      if (resp && resp.summary) {
        content += '\n\n' + resp.summary;
      }
      if (resp && resp.changes && resp.changes.length) {
        content += '\n\n更新内容：\n' + resp.changes.map(item => '- ' + item).join('\n');
      }
      if (resp && resp.warnings && resp.warnings.length) {
        const hasSyncFailed = resp.warnings.some(item => String(item || '').includes('sync_failed'));
        content += '\n\n提醒：\n';
        content += hasSyncFailed
          ? '- 画像已更新，但向量索引同步失败，后续可重试。'
          : resp.warnings.map(item => '- ' + item).join('\n');
      }
    }
    aiMessages.push({ role: 'system', content });
  } catch (e) {
    aiMessages.push({
      role: 'system',
      content: '画像更新失败：' + (e && e.message ? e.message : '请稍后重试')
    });
  } finally {
    profileUpdating = false;
    renderAiMessages();
  }
}

// ========== 工具 ==========
function esc(t) { if(!t)return''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function escAttr(t) { return esc(t).replace(/'/g, '&#39;'); }

function renderAiContent(content, role) {
  if (role !== 'assistant') {
    return esc(content);
  }
  const lines = String(content || '').replace(/\r\n/g, '\n').split('\n');
  let html = '';
  let paragraph = [];
  let listType = null;

  function flushParagraph() {
    if (!paragraph.length) return;
    html += '<p>' + inlineMarkdown(paragraph.join('<br>')) + '</p>';
    paragraph = [];
  }

  function closeList() {
    if (!listType) return;
    html += '</' + listType + '>';
    listType = null;
  }

  lines.forEach(rawLine => {
    const line = rawLine.trim();
    if (!line) {
      flushParagraph();
      closeList();
      return;
    }

    const ordered = line.match(/^(\d+)[.、]\s*(.+)$/);
    const unordered = line.match(/^[-*]\s+(.+)$/);
    if (ordered || unordered) {
      flushParagraph();
      const nextType = ordered ? 'ol' : 'ul';
      if (listType !== nextType) {
        closeList();
        html += '<' + nextType + '>';
        listType = nextType;
      }
      html += '<li>' + inlineMarkdown(ordered ? ordered[2] : unordered[1]) + '</li>';
      return;
    }

    closeList();
    paragraph.push(esc(line));
  });

  flushParagraph();
  closeList();
  return html || esc(content);
}

function inlineMarkdown(escapedText) {
  return escapedText
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

document.getElementById('aiSelectionClear').addEventListener('click', clearSelectedReadingContext);
document.querySelector('.ai-panel-header').addEventListener('click', function() {
  if (isMobileReader && document.querySelector('.ai-panel').classList.contains('mobile-open')) {
    window.closeMobileAiPanel();
  }
});
window.addEventListener('scroll', scheduleReadingProgressSave, { passive: true });
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') {
    saveReadingProgress();
  }
});

restoreUser();
restoreReaderStyle();
updateReaderThemeToggle();
updateUserStatus();
if (!isMobileReader) {
  loadBookshelf();
} else if (!isFlutterWebView && initialMobileBookId && hasAuthUser()) {
  window.openMobileBook(initialMobileBookId, currentUser);
}
updateAiPanelState();
renderAiMessages();
</script>
</body>
</html>
